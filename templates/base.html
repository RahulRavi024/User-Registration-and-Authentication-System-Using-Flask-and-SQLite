<!DOCTYPE html>
<html>

<head>
    <title>
        {% block title %}
        {% endblock %}
    </title>
</head>

<body>

<h1>Authentication System</h1>

<hr>


<!-- Flash Messages -->

{% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

        {% for category, message in messages %}

            <p>
                {{ message }}
            </p>

        {% endfor %}

    {% endif %}

{% endwith %}


{% block content %}

{% endblock %}


<hr>

<p>My Flask Login Project</p>

</body>

</html>
