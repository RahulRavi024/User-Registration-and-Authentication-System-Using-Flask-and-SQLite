{% extends "base.html" %}


{% block title %}
Login
{% endblock %}



{% block content %}

<h2>Login Page</h2>


<form method="POST">

    <input 
    type="text" 
    name="username" 
    placeholder="Username">

    <br><br>


    <input 
    type="password" 
    name="password" 
    placeholder="Password">

    <br><br>


    <button type="submit">
        Login
    </button>

</form>


<br>

<a href="/register">
Create Account
</a>


{% endblock %}
